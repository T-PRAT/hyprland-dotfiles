# Ayu Dark Theme Colors for Hyprland
# Based on the official Ayu color palette

# Main background and foreground
$background = rgb(0D1017)
$foreground = rgb(BFBDB6)

# Ayu color palette
$color0 = rgb(0D1017)   # Black
$color1 = rgb(D95757)   # Red
$color2 = rgb(AAD94C)   # Green
$color3 = rgb(FFB454)   # Yellow/Orange
$color4 = rgb(59C2FF)   # Blue
$color5 = rgb(D2A6FF)   # Magenta/Purple
$color6 = rgb(95E6CB)   # Cyan
$color7 = rgb(FFFFFF)   # White
$color8 = rgb(555E73)   # Bright Black
$color9 = rgb(D95757)   # Bright Red
$color10 = rgb(AAD94C)  # Bright Green
$color11 = rgb(FFB454) # Bright Yellow/Orange
$color12 = rgb(59C2FF) # Bright Blue
$color13 = rgb(D2A6FF) # Bright Magenta/Purple
$color14 = rgb(95E6CB) # Bright Cyan
$color15 = rgb(FFFFFF) # Bright White

# Additional Ayu colors
$ayu-orange = rgb(FFB454)
$ayu-blue = rgb(59C2FF)
$ayu-green = rgb(AAD94C)
$ayu-red = rgb(D95757)
$ayu-purple = rgb(D2A6FF)
$ayu-cyan = rgb(95E6CB)
$ayu-gray = rgb(555E73)
$ayu-gray-bright = rgb(555E73)

# Border colors using Ayu palette (used in general section)
# col.active_border and col.inactive_border are set in hyprland.conf general section

# Shadow color
shadow_color = $background

# Group border colors
col.group_border = $ayu-blue
col.group_border_active = $ayu-orange
col.group_border_locked_active = $ayu-red
col.group_border_locked_inactive = $ayu-gray

# Group background colors
col.group_bg = $background
col.group_bg_active = $background
col.group_bg_locked_active = $background
col.group_bg_locked_inactive = $background
