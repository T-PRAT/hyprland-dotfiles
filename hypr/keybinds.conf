####################################
### PROGRAMS ###
####################################

# See https://wiki.hypr.land/Configuring/Keywords/
# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = vicinae
$browser = zen-browser
$browser2 = google-chrome-stable
$editor = cursor
$editor2 = zeditor
$notes = obsidian
$message = beeper
$music = spotify


####################################
### KEYBINDINGS ###
####################################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Application launchers
bind = $mainMod, Space, exec, $menu toggle
bind = $mainMod, Return, exec, $terminal #enter
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, B, exec, $browser2
bind = $mainMod, I, exec, $music
bind = $mainMod, E, exec, $editor
bind = $mainMod SHIFT, E, exec, $editor2
bind = $mainMod, N, exec, $notes
bind = $mainMod, M, exec, $message
bind = $mainMod SHIFT, M, exec, $music

# Screenshot
bind = $mainMod SHIFT, C, exec, hyprshot -m window
bind = $mainMod SHIFT ALT, C, exec, hyprshot -m active
bind = $mainMod, C, exec, hyprshot -m region

# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, J, togglesplit, # dwindle

# Utilities
bind = $mainMod, P, exec, hyprpicker -a
bind = $mainMod, T, exec, kitty --title "Tomato" -e tomato
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, F12, exec, wlogout --protocol layer-shell -b 4
bind = $mainMod, F5, exec, killall waybar && waybar # Reload waybar
bindd = $mainMod, W, Speech-to-text, exec, /usr/lib/hyprwhspr/config/hyprland/hyprwhspr-tray.sh record

# Focus movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Window resizing
bind = $mainMod, minus, resizeactive, -30 0
bind = $mainMod, equal, resizeactive, 30 0
bind = $mainMod SHIFT, minus, resizeactive, 0 -30
bind = $mainMod SHIFT, equal, resizeactive, 0 30

# Window movement
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspace navigation
bind = $mainMod, TAB, workspace, previous_per_monitor
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7

# Move windows to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7


# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Mouse bindings
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio controls (PipeWire)
# Volume with Shift modifier (fine control)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 2%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Volume without Shift (normal control)
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness controls
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media controls (requires playerctl)
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
